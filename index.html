<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research @ APAMSA — Poster Judging</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#999;
  --navy:#1B2C6B;
  --surface:#fff;--surface2:#f8f7f5;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius:10px;
  --fd:'DM Serif Display',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --accent:#1a1a1a;--accent-l:#f5f5f5;--accent-d:#000;--accent-b:#ccc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--surface2);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
nav{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--fd);font-size:1.05rem;color:var(--navy)}
.page{display:none}
.page.active{display:block}
.fw{max-width:540px;margin:0 auto;padding:1.5rem 1rem 4rem}
.ptrack{height:2px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.card{background:var(--surface);border-radius:16px;border:.5px solid var(--border);padding:1.75rem;animation:su .28s ease}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.35rem}
.ctitle{font-family:var(--fd);font-size:1.5rem;line-height:1.25;color:var(--ink);margin-bottom:.3rem}
.csub{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:1.25rem}
.wlogo{display:block;width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 1.25rem}
.worg{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);text-align:center;margin-bottom:.25rem}
.wtitle{font-family:var(--fd);font-size:1.7rem;line-height:1.2;color:var(--ink);text-align:center;margin-bottom:.5rem}
.wsub{font-size:13px;color:var(--ink2);line-height:1.6;text-align:center;margin-bottom:1.5rem}
.cat-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem}
.cat-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;background:var(--surface)}
.cat-item:hover{border-color:var(--border2);background:var(--surface2)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:13px;color:var(--ink)}
.score-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1.1rem}
.score-item{display:flex;align-items:flex-start;gap:11px;padding:9px 12px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s;background:var(--surface)}
.score-item:hover{border-color:var(--border2)}
.sbadge{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;border:1px solid var(--border2);color:var(--ink2);transition:all .15s}
.slbl{font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:1px}
.sdesc{font-size:12px;color:var(--ink3);line-height:1.4}
.fgroup{margin-bottom:.9rem}
.flabel{font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:4px;display:block}
.finput{width:100%;padding:9px 12px;font-size:14px;font-family:var(--fb);color:var(--ink);background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--accent)}
textarea.finput{resize:vertical;min-height:78px;margin-top:.4rem;line-height:1.5}
.nrow{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;padding-top:1.1rem;border-top:.5px solid var(--border)}
.btn{padding:8px 20px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--ink);font-family:var(--fb);transition:background .15s,transform .1s}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-p{background:var(--accent);color:#fff;border-color:transparent}
.btn-p:hover{filter:brightness(.87);background:var(--accent)}
.brow{display:flex;gap:7px;flex-wrap:wrap;margin-top:1.1rem}
.srows{display:flex;flex-direction:column;gap:6px;margin:1rem 0}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 11px;background:var(--surface2);border-radius:8px;font-size:13px}
.srow.sp{border-left:2px solid var(--accent);border-radius:0 8px 8px 0}
.sc{color:var(--ink2);flex:1}
.ss{font-weight:500;color:var(--ink);text-align:right}
.sw{color:var(--accent);font-weight:500}
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-radius:var(--radius);border:1.5px solid var(--accent-b);background:var(--accent-l);font-weight:500;font-size:15px;margin-bottom:.9rem}
.tscore{font-size:20px;font-family:var(--fd);color:var(--accent)}
.smsg{padding:9px 13px;border-radius:var(--radius);font-size:13px;margin-top:.7rem;text-align:center}
.mok{background:#EAF3DE;color:#27500A}
.merr{background:#FCEBEB;color:#501313}
.mspin{background:var(--surface2);color:var(--ink2)}
@media(max-width:480px){.card{padding:1.35rem}.ctitle{font-size:1.3rem}nav{padding:0 1rem}}
</style>
</head>

    <div class="ptrack"><div class="pfill" id="pbar" style="width:0%"></div></div>

const SHEETS_URL='https://script.google.com/macros/s/AKfycbxNr4xiLGAUM0sOKtjW_CwZZJUJdSWY6-P48tERLjdlfpulk484YDG4vbt58wzMDECp/exec';

let fs={ci:0,judge:'',poster:'',presenter:'',scores:{},notes:{},str:'',imp:''};
let steps=[],si=0;
function p(i){return PAL[i!==undefined?i:fs.ci];}
function gk(ci,i){return ci+'_'+i;}
function buildSteps(){
  const cr=[...SHARED,{...SPEC[fs.ci],isSp:true}];
  steps=[{t:'welcome'},{t:'cat'},{t:'info'},...cr.map((c,i)=>({t:'score',c,i})),{t:'notes'},{t:'sum'}];
  si=0;
}
function total(){
  return Math.round([...SHARED,SPEC[fs.ci]].reduce((t,c,i)=>{
    const s=fs.scores[gk(fs.ci,i)];return t+(s?(s/5)*c.weight:0);
  },0)*10)/10;
}
function theme(pp){
  const r=document.documentElement.style;
  r.setProperty('--accent',pp.accent);
  r.setProperty('--accent-l',pp.light);
  r.setProperty('--accent-d',pp.dark);
  r.setProperty('--accent-b',pp.border);
  document.getElementById('pbar').style.background=pp.accent;
}
function rf(){
  const pp=p();theme(pp);
  document.getElementById('pbar').style.width=Math.round((si/(steps.length-1))*100)+'%';
  const step=steps[si];
  const el=document.getElementById('fcard');

  if(step.t==='welcome'){
    el.innerHTML=`<div class="card" style="text-align:center;padding:2.25rem 1.75rem">
      <img src="${LOGO}" class="wlogo" alt="APAMSA logo">
      <div class="worg">National APAMSA Research Conference</div>
      <div class="wtitle">Poster Judging</div>
      <div class="wsub">Thank you for serving as a judge. This form will guide you through scoring a research poster step by step.</div>
      <button class="btn btn-p" onclick="nx()" style="margin:0 auto;display:block;padding:10px 32px">Begin</button>
    </div>`;

  }else if(step.t==='cat'){
    el.innerHTML=`<div class="card">
      <div class="eyebrow" style="color:${pp.accent}">Step 1</div>
      <div class="ctitle">Which category are you judging?</div>
      <div class="csub">Select the poster's submission category to load the correct rubric.</div>
      <div class="cat-list">${CATS.map((c,i)=>{const cp=p(i);const sel=fs.ci===i;return`<div class="cat-item" data-c="${i}" style="${sel?`border-color:${cp.accent};background:${cp.light}`:''}">
        <span class="cat-dot" style="background:${cp.accent}"></span>
        <span class="cat-name">${c}</span></div>`;}).join('')}</div>
      <div class="nrow"><button class="btn" onclick="bk()">Back</button><button class="btn btn-p" onclick="nx()">Continue</button></div></div>`;
    el.querySelectorAll('[data-c]').forEach(d=>d.addEventListener('click',()=>{fs.ci=+d.dataset.c;buildSteps();si=1;rf();}));

  }else if(step.t==='info'){
    el.innerHTML=`<div class="card">
      <div class="eyebrow" style="color:${pp.accent}">Step 2</div>
      <div class="ctitle">Your details</div>
      <div class="csub">Appears on your scoring rubric and helps us stay organized.</div>
      <div class="fgroup"><label class="flabel">Your name</label><input class="finput" id="fj" placeholder="e.g. Dr. Sarah Kim" value="${fs.judge}"></div>
      <div class="fgroup"><label class="flabel">Poster number</label><input class="finput" id="fp" placeholder="e.g. 042" value="${fs.poster}"></div>
      <div class="fgroup"><label class="flabel">Presenter name</label><input class="finput" id="fr" placeholder="e.g. Alex Chen" value="${fs.presenter}"></div>
      <div class="nrow"><button class="btn" onclick="bk()">Back</button><button class="btn btn-p" onclick="saveInfo()">Start scoring</button></div></div>`;

  }else if(step.t==='score'){
    const {c,i}=step;const key=gk(fs.ci,i);const sel=fs.scores[key];const note=fs.notes[key]||'';
    const totalCrit=SHARED.length+1;
    const label=c.isSp?'Category-specific criterion':`Criterion ${i+1} of ${totalCrit}`;
    el.innerHTML=`<div class="card">
      <div class="eyebrow" style="color:${pp.accent}">${label}</div>
      ${c.isSp?`<div style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:${pp.light};color:${pp.dark};border:1px solid ${pp.border};margin-bottom:.5rem">${CATS[fs.ci]}</div>`:''}
      <div class="ctitle">${c.name}</div>
      <div class="csub">Weight: <strong>${c.weight}%</strong> of total score</div>
      <div class="score-list">${[5,4,3,2,1].map(s=>`<div class="score-item" data-s="${s}" style="${sel===s?`border-color:${pp.accent};background:${pp.light}`:''}">
        <div class="sbadge" style="${sel===s?`background:${pp.accent};color:#fff;border-color:${pp.accent}`:''}"> ${s}</div>
        <div><div class="slbl" style="${sel===s?`color:${pp.dark}`:''}"> ${SL[s]}</div><div class="sdesc" style="${sel===s?`color:${pp.dark}`:''}"> ${c.descs[s]}</div></div>
      </div>`).join('')}</div>
      <textarea class="finput" id="cnote" placeholder="Optional notes...">${note}</textarea>
      <div class="nrow"><button class="btn" onclick="bk()">Back</button><button class="btn btn-p" id="nxb" onclick="nx()" ${!sel?'disabled':''}>Next</button></div></div>`;
    el.querySelectorAll('[data-s]').forEach(d=>d.addEventListener('click',()=>{fs.scores[key]=+d.dataset.s;rf();}));

  }else if(step.t==='notes'){
    el.innerHTML=`<div class="card">
      <div class="eyebrow" style="color:${pp.accent}">Almost done</div>
      <div class="ctitle">Overall comments</div>
      <div class="csub">Optional feedback for the presenter.</div>
      <label class="flabel" style="margin-top:.25rem">Strengths</label>
      <textarea class="finput" id="fstr" placeholder="What did this poster do well?">${fs.str}</textarea>
      <label class="flabel" style="margin-top:.7rem">Areas for improvement</label>
      <textarea class="finput" id="fimp" placeholder="What could be strengthened?">${fs.imp}</textarea>
      <div class="nrow"><button class="btn" onclick="bk()">Back</button><button class="btn btn-p" onclick="saveNotes()">Review &amp; submit</button></div></div>`;

  }else if(step.t==='sum'){
    const ci=fs.ci;const criteria=[...SHARED,SPEC[ci]];const tot=total();
    el.innerHTML=`<div class="card">
      <div class="eyebrow" style="color:${pp.accent}">Review &amp; submit</div>
      <div class="ctitle">Rubric summary</div>
      <div class="csub"><strong>${CATS[ci]}</strong><br>Poster #${fs.poster||'—'} &nbsp;·&nbsp; ${fs.presenter||'—'} &nbsp;·&nbsp; Judge: ${fs.judge||'—'}</div>
      <div class="srows">${criteria.map((c,i)=>{const s=fs.scores[gk(ci,i)];const w=s?((s/5)*c.weight).toFixed(1):'—';return`<div class="srow ${i===SHARED.length?'sp':''}">
        <span class="sc">${c.name}</span>
        <span class="ss">${s?SL[s]+' ('+s+'/5)':'—'} &nbsp;<span class="sw">${w}/${c.weight}</span></span></div>`;}).join('')}</div>
      <div class="trow"><span>Total score</span><span class="tscore">${tot} / 100</span></div>
      ${fs.str||fs.imp?`<div style="font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:.75rem">${fs.str?`<strong style="color:var(--ink)">Strengths:</strong> ${fs.str}<br>`:''}${fs.imp?`<strong style="color:var(--ink)">Improvements:</strong> ${fs.imp}`:''}</div>`:''}
      <div id="smsg"></div>
      <div class="brow">
        <button class="btn btn-p" id="subb" onclick="submitScore()">Submit score</button>
        <button class="btn" onclick="cpText()">Copy summary</button>
        <button class="btn" onclick="again()">Score another</button>
      </div>
      <div class="nrow" style="border:none;padding-top:.75rem"><button class="btn" onclick="bk()">Back</button><span></span></div></div>`;
  }
}
function nx(){
  const step=steps[si];
  if(step.t==='score'){const e=document.getElementById('cnote');if(e)fs.notes[gk(fs.ci,step.i)]=e.value;}
  si++;rf();
}
function bk(){
  const step=steps[si];
  if(step.t==='notes'){const s=document.getElementById('fstr');const m=document.getElementById('fimp');if(s)fs.str=s.value;if(m)fs.imp=m.value;}
  if(step.t==='score'){const e=document.getElementById('cnote');if(e)fs.notes[gk(fs.ci,step.i)]=e.value;}
  si--;rf();
}
function saveInfo(){
  fs.judge=document.getElementById('fj').value.trim();
  fs.poster=document.getElementById('fp').value.trim();
  fs.presenter=document.getElementById('fr').value.trim();
  si++;rf();
}
function saveNotes(){
  fs.str=document.getElementById('fstr').value;
  fs.imp=document.getElementById('fimp').value;
  si++;rf();
}
async function submitScore(){
  const btn=document.getElementById('subb');
  const msg=document.getElementById('smsg');
  btn.disabled=true;btn.textContent='Submitting...';
  msg.className='smsg mspin';msg.textContent='Sending your score...';
  try{
    const ci=fs.ci;
    await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      judge:fs.judge,poster:fs.poster,presenter:fs.presenter,category:CATS[ci],
      s0:fs.scores[gk(ci,0)],s1:fs.scores[gk(ci,1)],s2:fs.scores[gk(ci,2)],
      s3:fs.scores[gk(ci,3)],s4:fs.scores[gk(ci,4)],s5:fs.scores[gk(ci,5)],
      s6:fs.scores[gk(ci,6)],total:total(),strengths:fs.str,improvements:fs.imp
    })});
    msg.className='smsg mok';msg.textContent='Score submitted successfully!';
    btn.textContent='Submitted';
  }catch(e){
    msg.className='smsg merr';msg.textContent='Network error — please use Copy summary as backup.';
    btn.disabled=false;btn.textContent='Retry';
  }
}
function cpText(){
  const ci=fs.ci;const cr=[...SHARED,SPEC[ci]];
  const lines=[`APAMSA Poster Judging Rubric`,`Category: ${CATS[ci]}`,
    `Poster #: ${fs.poster}  |  Presenter: ${fs.presenter}  |  Judge: ${fs.judge}`,``,
    ...cr.map((c,i)=>{const s=fs.scores[gk(ci,i)]||'N/A';const w=s!=='N/A'?((s/5)*c.weight).toFixed(1):'—';return`${c.name} (${c.weight}%): ${s}/5 = ${w} pts`;}),
    ``,`TOTAL: ${total()} / 100`,
    fs.str?`\nStrengths: ${fs.str}`:'',fs.imp?`Areas for improvement: ${fs.imp}`:'',
  ].filter(l=>l!==undefined).join('\n');
  navigator.clipboard.writeText(lines).then(()=>{
    const btns=document.querySelectorAll('.brow .btn');
    const b=btns[1];if(b){b.textContent='Copied!';setTimeout(()=>{b.textContent='Copy summary';},2000);}
  });
}
function again(){
  fs={...fs,poster:'',presenter:'',scores:{},notes:{},str:'',imp:''};
  buildSteps();si=1;rf();
}
buildSteps();rf();
</script>
</body>
</html>
